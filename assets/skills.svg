<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 430" width="1180" height="430" role="img" aria-label="Animated skill self-assessment bars">
<defs><linearGradient id="rainbowBar" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#FFD700"><animate attributeName="stop-color" values="#FFD700;#ec4899;#22D3EE;#10B981;#FFD700" dur="5s" repeatCount="indefinite"/></stop>
<stop offset="100%" stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#FFD700;#ec4899;#22D3EE;#10B981" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient><clipPath id="sc"><rect width="1180" height="430" rx="16"/></clipPath></defs>
<g clip-path="url(#sc)">
<rect width="1180" height="430" fill="#0F172A"/>
<text x="40" y="34" font-family="'Segoe UI',Arial" font-weight="bold" font-size="18" fill="#94A3B8">SELF-ASSESSMENT — bars animate on load, honestly calibrated</text>

<text x="40" y="71" font-family="monospace" font-size="16" fill="#F8FAFC">HTML / CSS</text>
<text x="1140" y="71" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">foundation<animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="56" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="56" width="0" height="18" rx="9" fill="#22D3EE">
  <animate attributeName="width" values="0;460" begin="0.3s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="56" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="1.7s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="71" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#22D3EE" opacity="0">72%<animate attributeName="opacity" values="0;1" begin="1.4000000000000001s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="123" font-family="monospace" font-size="16" fill="#F8FAFC">JavaScript</text>
<text x="1140" y="123" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">applied in production<animate attributeName="opacity" values="0;1" begin="1.75s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="108" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="108" width="0" height="18" rx="9" fill="#F59E0B">
  <animate attributeName="width" values="0;409" begin="0.55s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="108" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="1.95s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="123" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#F59E0B" opacity="0">64%<animate attributeName="opacity" values="0;1" begin="1.6500000000000001s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="175" font-family="monospace" font-size="16" fill="#F8FAFC">React / Next.js</text>
<text x="1140" y="175" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">two deployed apps<animate attributeName="opacity" values="0;1" begin="2.0s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="160" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="160" width="0" height="18" rx="9" fill="#7C3AED">
  <animate attributeName="width" values="0;460" begin="0.8s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="160" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="2.2s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="175" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#7C3AED" opacity="0">72%<animate attributeName="opacity" values="0;1" begin="1.9000000000000001s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="227" font-family="monospace" font-size="16" fill="#F8FAFC">TypeScript</text>
<text x="1140" y="227" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">strict mode, no any<animate attributeName="opacity" values="0;1" begin="2.25s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="212" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="212" width="0" height="18" rx="9" fill="#3B82F6">
  <animate attributeName="width" values="0;358" begin="1.05s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="212" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="2.45s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="227" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#3B82F6" opacity="0">56%<animate attributeName="opacity" values="0;1" begin="2.1500000000000004s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="279" font-family="monospace" font-size="16" fill="#F8FAFC">Backend / MongoDB</text>
<text x="1140" y="279" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">JWT auth, Atlas<animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="264" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="264" width="0" height="18" rx="9" fill="#10B981">
  <animate attributeName="width" values="0;358" begin="1.3s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="264" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="2.7s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="279" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#10B981" opacity="0">56%<animate attributeName="opacity" values="0;1" begin="2.4000000000000004s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="331" font-family="monospace" font-size="16" fill="#F8FAFC">Testing</text>
<text x="1140" y="331" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">actively learning<animate attributeName="opacity" values="0;1" begin="2.75s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="316" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="316" width="0" height="18" rx="9" fill="#EF4444">
  <animate attributeName="width" values="0;153" begin="1.55s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="316" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="2.95s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="331" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#EF4444" opacity="0">24%<animate attributeName="opacity" values="0;1" begin="2.6500000000000004s" dur="0.3s" fill="freeze"/></text>
<text x="40" y="383" font-family="monospace" font-size="16" fill="#F8FAFC">Consistency</text>
<text x="1140" y="383" text-anchor="end" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">daily commits<animate attributeName="opacity" values="0;1" begin="3.0s" dur="0.4s" fill="freeze"/></text>
<rect x="300" y="368" width="640" height="18" rx="9" fill="#1e293b"/>
<rect x="300" y="368" width="0" height="18" rx="9" fill="url(#rainbowBar)">
  <animate attributeName="width" values="0;640" begin="1.8s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
</rect>
<rect x="300" y="368" width="60" height="18" rx="9" fill="#ffffff" opacity="0.18">
  <animateTransform attributeName="transform" type="translate" values="-70,0;640,0" begin="3.2s" dur="2.2s" repeatCount="indefinite"/>
</rect>
<text x="960" y="383" text-anchor="start" font-family="monospace" font-size="14" font-weight="bold" fill="#FFD700" opacity="0">100%<animate attributeName="opacity" values="0;1" begin="2.9000000000000004s" dur="0.3s" fill="freeze"/></text>
</g>
<rect x="1" y="1" width="1178" height="428" rx="16" fill="none" stroke="#1e293b" stroke-width="1.5"/>
</svg>
