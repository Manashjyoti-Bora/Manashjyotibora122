<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 22" width="1180" height="22" role="img" aria-label="divider">
<defs>
<linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite"/></stop>
</linearGradient>
<filter id="dgl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="0" y="10" width="1180" height="2.5" rx="1.25" fill="url(#dg)" opacity="0.85"/>
<circle cy="11" r="4" fill="#22D3EE" filter="url(#dgl)"><animate attributeName="cx" values="-10;1190" dur="5s" repeatCount="indefinite"/></circle>
<circle cy="11" r="2.5" fill="#F8FAFC"><animate attributeName="cx" values="-10;1190" dur="5s" repeatCount="indefinite"/></circle>
</svg>
